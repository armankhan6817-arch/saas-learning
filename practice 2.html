<!doctype html>
<script>
  "use strict";

  let i = 2;
  let n = +prompt(
    "Enter a number to detect how much prime numbers it has total ",
  );

  while (i <= n) {
    //alert(i);

    for (let j = 2; j <= i; j++) {
      if (i % j === 0 && j !== i) {
        break;
      } else if (j === i - 1 || i === 2) {
        console.log(i + " is a prime number");
      }
    }

    i++;
  }
</script>
