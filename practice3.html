<!doctype html>
<script>
  "use strict";

  let number = 50;

  for (let i = 1; i <= number; i++) {
    if (i % 3 === 0 && i % 5 === 0) {
      console.log("FizzBuzz :" + i);
    } else if (i % 3 === 0) {
      console.log("Fizz :" + i);
    } else if (i % 5 === 0) {
      console.log("Buzz :" + i);
    } else {
      console.log("Normal Number :" + i);
    }
  }
</script>
